name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: No-token test, syntax, and package checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20.11.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Syntax checks
        run: |
          node --check goals.js
          node --check goals-core.js
          node --check opencode-session-adapter.js
          node --check goal-state.js
          node --check diagnostics.js
          node --check secret-redaction.js
          node --check unicode-text.js

      - name: Tests
        run: npm test

      - name: Package dry-run
        run: npm pack --dry-run --json
